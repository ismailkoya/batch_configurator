name: Build BatchConfigurator

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            out:  BatchConfigurator-win64.exe
          - os: windows-latest
            arch: x86
            out:  BatchConfigurator-win32.exe
          - os: ubuntu-latest
            arch: x64
            out:  BatchConfigurator-linux
          # macos-13 (Intel) disabled — GitHub's Intel Mac runner pool is
          # shrinking as Apple deprecates Intel hardware. Jobs queue for
          # hours or days regardless of repo visibility. Apple Silicon has
          # been standard since Nov 2020, so most current Mac users are on
          # macos-arm64 anyway. If a specific customer needs an Intel Mac
          # binary, build it locally on an Intel Mac with:
          #   pip install pyinstaller pyserial cryptography==41.0.7 pillow openpyxl
          #   pyinstaller --onefile --windowed --name BatchConfigurator batch_configurator.py
          # - os: macos-13
          #   arch: x64
          #   out:  BatchConfigurator-macos-intel
          - os: macos-latest     # Apple Silicon runner
            arch: arm64
            out:  BatchConfigurator-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install tk (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        shell: bash
        run: |
          # cryptography stopped publishing 32-bit Windows wheels after 41.x
          # — pinning to 41.0.7 lets the x86 build pick a prebuilt wheel
          # instead of trying to compile Rust + OpenSSL on the runner.
          # 41.0.7 also has wheels for every other target we build, so we
          # apply the pin uniformly for reproducibility.
          pip install pyinstaller pyserial "cryptography==41.0.7" pillow openpyxl

      - name: Generate icon
        continue-on-error: true
        run: python make_icon.py

      - name: Build
        run: pyinstaller --onefile --windowed --icon=batch_configurator.ico --name=BatchConfigurator --clean --noconfirm batch_configurator.py

      - name: Rename output
        shell: bash
        run: |
          cd dist
          if [ -f BatchConfigurator.exe ]; then mv BatchConfigurator.exe "${{ matrix.out }}"
          else mv BatchConfigurator "${{ matrix.out }}"; fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}
